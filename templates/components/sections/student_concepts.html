<ul class="list-group">
    {% for concept in concepts %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
            <span>{{ concept.ConceptName }}</span>
            <a class="btn btn-sm btn-primary" href="{% url 'learning:start_quiz' concept.pk %}">Start Quiz</a>
        </li>
    {% empty %}
        <li class="list-group-item">No concepts available yet.</li>
    {% endfor %}
</ul>
