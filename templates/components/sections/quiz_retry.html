<div class="alert alert-warning">
    <h6 class="mb-2">Remedial Feedback</h6>
    {% if micro_lesson %}
        <p class="mb-2">{{ micro_lesson }}</p>
    {% else %}
        <p class="mb-2">Review the concept briefly, then continue to the next question.</p>
    {% endif %}
    {% if source_question %}
        <p class="mb-0"><strong>Previous question:</strong> {{ source_question.QuestionText }}</p>
    {% endif %}
</div>
<form method="post" action="{% url 'learning:continue_to_next_question' attempt.pk %}">
    {% csrf_token %}
    <button type="submit" class="btn btn-primary">Next Question</button>
</form>
