{% for summary in summaries %}
    <div class="border rounded p-3 mb-3 bg-light">
        <h6>{{ summary.Lecture.Title }}</h6>
        <p class="mb-2">{{ summary.SummaryText|truncatechars:220 }}</p>
        <span class="badge bg-secondary">Archived</span>
        <form method="post" action="{% url 'content:restore_summary' summary.pk %}" class="d-inline ms-2" onsubmit="return confirm('Restore this summary to active queue?');">
            {% csrf_token %}
            <button type="submit" class="btn btn-sm btn-outline-success">Restore</button>
        </form>
    </div>
{% empty %}
    <p class="text-muted mb-0">No archived summaries.</p>
{% endfor %}
