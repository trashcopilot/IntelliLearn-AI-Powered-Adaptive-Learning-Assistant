{% load summary_filters %}

{% for summary in summaries %}
    <div class="queue-item">
        <h6>{{ summary.Lecture.Title }}</h6>
        <div class="summary-preview summary-preview-compact mb-2">{{ summary.SummaryText|clean_summary_preview|truncatechars:320|linebreaksbr }}</div>
        <div class="d-flex flex-wrap gap-2 align-items-center">
            <span class="badge bg-secondary">Archived</span>
            <form method="post" action="{% url 'content:restore_summary' summary.pk %}" class="d-inline" onsubmit="return confirm('Restore this summary to active queue?');">
                {% csrf_token %}
                <button type="submit" class="btn btn-sm btn-outline-success">Restore</button>
            </form>
            <form method="post" action="{% url 'content:delete_archived_summary' summary.pk %}" class="d-inline" onsubmit="return confirm('Permanently delete this archived summary? This cannot be undone.');">
                {% csrf_token %}
                <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
            </form>
        </div>
    </div>
{% empty %}
    <p class="text-muted mb-0">No archived summaries.</p>
{% endfor %}
